<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>ARTales offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(circle at top, rgba(217,183,110,.2), transparent 28rem), #fbf5ea;
        color: #0d1528;
      }
      main {
        max-width: 560px;
        border: 1px solid rgba(13,21,40,.12);
        border-radius: 28px;
        background: rgba(255,255,255,.68);
        box-shadow: 0 24px 70px rgba(13,21,40,.12);
        padding: 32px;
      }
      h1 { font-family: Georgia, "Times New Roman", serif; font-size: clamp(36px, 8vw, 64px); line-height: 1; margin: 0 0 14px; }
      p { line-height: 1.6; margin: 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>ARTales</h1>
      <p>You appear to be offline. Reconnect and open ARTales again. Offline reading cache will be expanded in a later release.</p>
    </main>
  </body>
</html>
